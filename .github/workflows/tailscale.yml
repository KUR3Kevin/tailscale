name: Tailscale Exit Node

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH }}

      - name: Check exit node status
        run: |
          echo "=== Tailscale Status ==="
          tailscale status
          echo "=== Checking marsels-mac-mini ==="
          tailscale status --json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          target = 'marsels-mac-mini'
          for k, v in data.get('Peer', {}).items():
              hostname = v.get('HostName', '').lower()
              dnsname = v.get('DNSName', '').lower()
              if target in hostname or target in dnsname:
                  print('Host:', v.get('HostName', ''))
                  online = v.get('Online', False)
                  print('Online:', online)
                  sys.exit(0 if online else 1)
          print(target + ' not found')
          sys.exit(1)
          "
